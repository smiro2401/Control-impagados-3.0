<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Impagados · Playoff</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');
:root{
  --navy:#0F1E3C; --navy2:#16294f; --panel:#FFFFFF; --bg:#F8FAFF;
  --ink:#1a2438; --muted:#6b7896; --line:#e4e9f5; --line2:#eef2fb;
  --red:#E53E3E; --amber:#F6AD55; --green:#38A169; --blue:#3b6fe0;
  --crit:#E53E3E; --mora:#F6AD55; --pend:#3b6fe0;
}
*{box-sizing:border-box} html,body{margin:0; padding:0; background:var(--bg)}
#app{font-family:'Inter',system-ui,sans-serif; color:var(--ink); background:var(--bg); margin:0 auto; max-width:1240px; padding:0 0 60px; min-height:100vh}
.head{background:linear-gradient(120deg,var(--navy),var(--navy2)); color:#fff; padding:26px 30px 30px; border-radius:0 0 22px 22px}
.head .top{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap}
.head h1{font-family:'Space Grotesk',sans-serif; font-size:23px; font-weight:700; margin:0; letter-spacing:-.4px}
.head .sub{color:#a9b8df; font-size:13px; margin:3px 0 0}
.tools{display:flex; gap:9px; flex-wrap:wrap; align-items:center}
.uemail{color:#a9b8df; font-size:12px; margin-right:4px}
.btn{font-family:inherit; border:0; border-radius:10px; padding:10px 16px; font-size:13.5px; font-weight:600; cursor:pointer; transition:.15s}
.btn.primary{background:#fff; color:var(--navy)}
.btn.primary:hover{background:#e9eefb}
.btn.ghost{background:rgba(255,255,255,.12); color:#fff}
.btn.ghost:hover{background:rgba(255,255,255,.22)}
.btn.sm{padding:7px 13px; font-size:12.5px}
.btn[disabled]{opacity:.5; cursor:default}
.kpis{display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-top:24px}
.kpi{background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.13); border-radius:14px; padding:15px 16px}
.kpi .v{font-family:'Space Grotesk',sans-serif; font-size:25px; font-weight:700; line-height:1; letter-spacing:-.5px}
.kpi .l{color:#a9b8df; font-size:11.5px; margin-top:7px; text-transform:uppercase; letter-spacing:.5px}
.kpi.alert .v{color:#ffb3b3}
.kpi.amber .v{color:#ffd9a8}
.kpi.kit .v{color:#9fe6c4}
.wrap{padding:24px 30px 0}
.section{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:20px; box-shadow:0 1px 3px rgba(15,30,60,.04)}
.section h2{font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:600; margin:0 0 4px; display:flex; align-items:center; gap:8px}
.section .desc{color:var(--muted); font-size:12.5px; margin:0 0 16px}
.cols{display:grid; grid-template-columns:1.35fr 1fr; gap:20px}
.rk{display:flex; flex-direction:column; gap:11px}
.rkrow{display:grid; grid-template-columns:18px 1fr auto; gap:11px; align-items:center; cursor:pointer}
.rkrow .pos{color:var(--muted); font-size:12px; font-weight:600; text-align:right}
.rkrow .body{min-width:0}
.rkrow .nm{font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px}
.rkrow .track{height:9px; background:var(--line2); border-radius:5px; overflow:hidden}
.rkrow .fill{height:100%; border-radius:5px}

.bars{display:flex; align-items:flex-end; gap:10px; height:150px; padding-top:10px}
.bc{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end}
.bc .col{width:100%; max-width:46px; background:linear-gradient(180deg,#5b8def,#3b6fe0); border-radius:6px 6px 0 0; min-height:3px}
.bc .cnt{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:13px}
.bc .lbl{font-size:10px; color:var(--muted); text-align:center; line-height:1.2}
.donut-wrap{display:flex; align-items:center; gap:18px}
.donut{flex-shrink:0}
.dleg{display:flex; flex-direction:column; gap:9px; flex:1}
.dleg .di{display:flex; align-items:center; gap:8px; font-size:12.5px}
.dleg .di .sw{width:11px; height:11px; border-radius:3px}
.dleg .di b{font-family:'Space Grotesk',sans-serif}
.dleg .di span{color:var(--muted); margin-left:auto; padding-left:14px}
.tbar{display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:center}
.search{flex:1; min-width:200px; border:1px solid var(--line); background:var(--bg); border-radius:10px; padding:10px 13px; font-size:13.5px; font-family:inherit; color:var(--ink)}
.search:focus{outline:none; border-color:var(--blue)}
table{width:100%; border-collapse:collapse}
th{text-align:left; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; padding:9px 12px; border-bottom:2px solid var(--line); cursor:pointer; user-select:none; white-space:nowrap}
th.r{text-align:right} th.c{text-align:center}
th:hover{color:var(--blue)}
th .ar{opacity:.5; font-size:9px}
td{padding:11px 12px; border-bottom:1px solid var(--line2); font-size:13px}
td.r{text-align:right} td.c{text-align:center}
tr.trow{cursor:pointer}
tr.trow:hover td{background:var(--bg)}
.cname{font-weight:600; display:flex; align-items:center; gap:7px}
.amt{font-family:'Space Grotesk',sans-serif; font-weight:700}
.amt.big{color:var(--red)}
.pill{display:inline-block; font-size:10.5px; font-weight:600; padding:3px 9px; border-radius:20px}
.pill.crit{background:#fde8e8; color:var(--crit)}
.pill.mora{background:#fef0e0; color:#c2780f}
.pill.pend{background:#e7eefc; color:var(--pend)}
.ic{font-size:11px}
.dot{width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0}
.empty{text-align:center; color:var(--muted); padding:70px 20px; border:2px dashed var(--line); border-radius:16px; background:var(--panel)}
.empty .big{font-size:30px; margin-bottom:14px}
.empty b{color:var(--ink)}
.banner{background:#fff4e5; border:1px solid #f6c68a; color:#8a5a12; border-radius:12px; padding:14px 16px; margin:24px 30px 0; font-size:13px; line-height:1.5}
.banner b{color:#6b430c}
.banner code{background:#fce6c4; padding:1px 6px; border-radius:5px; font-size:12px}
.ov{position:fixed; inset:0; background:rgba(15,30,60,.5); backdrop-filter:blur(3px); display:flex; align-items:flex-start; justify-content:center; padding:34px 16px; overflow:auto; z-index:50}
.modal{background:var(--panel); border-radius:18px; width:100%; max-width:740px; overflow:hidden; box-shadow:0 20px 60px rgba(15,30,60,.3)}
.mhead{background:linear-gradient(120deg,var(--navy),var(--navy2)); color:#fff; padding:22px 26px}
.mhead h3{font-family:'Space Grotesk',sans-serif; font-size:19px; margin:0; font-weight:700}
.mhead .csub{color:#a9b8df; font-size:12.5px; margin:3px 0 0}
.close{float:right; background:rgba(255,255,255,.15); border:0; color:#fff; width:30px; height:30px; border-radius:9px; font-size:18px; cursor:pointer; line-height:1}
.mbody{padding:22px 26px}
.mk3{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px}
.mk{background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:13px}
.mk .v{font-family:'Space Grotesk',sans-serif; font-size:19px; font-weight:700}
.mk .l{font-size:11px; color:var(--muted); margin-top:3px}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:13px; margin-bottom:14px}
label{display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.4px}
.fld{width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:13.5px; font-family:inherit; color:var(--ink); background:#fff}
.fld:focus{outline:none; border-color:var(--blue)}
textarea.fld{min-height:92px; resize:vertical}
.saverow{display:flex; gap:12px; justify-content:flex-end; align-items:center; margin-top:4px}
.saved{color:var(--green); font-size:12.5px; font-weight:600; opacity:0; transition:.2s}
.saved.show{opacity:1}
details{margin-top:18px} summary{cursor:pointer; font-size:12.5px; font-weight:600; color:var(--muted)}
.ftable{font-size:12px; margin-top:10px}
.ftable th{padding:7px 9px; font-size:10px}
.ftable td{padding:7px 9px}
.login{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; font-family:'Inter',system-ui,sans-serif}
.lcard{background:#fff; border-radius:20px; box-shadow:0 18px 50px rgba(15,30,60,.18); width:100%; max-width:380px; overflow:hidden}
.lhead{background:linear-gradient(120deg,var(--navy),var(--navy2)); color:#fff; padding:28px 28px 26px}
.lhead h1{font-family:'Space Grotesk',sans-serif; font-size:20px; margin:0}
.lhead p{color:#a9b8df; font-size:12.5px; margin:5px 0 0}
.lbody{padding:24px 28px 28px}
.lbody label{margin-top:4px}
.lbody .fld{margin-bottom:14px}
.lerr{background:#fde8e8; color:#b32626; font-size:12.5px; padding:9px 12px; border-radius:9px; margin-bottom:14px; display:none}
.lerr.show{display:block}
.lbtn{width:100%; background:var(--navy); color:#fff; border:0; border-radius:10px; padding:12px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit}
.lbtn:hover{background:var(--navy2)}
.lbtn[disabled]{opacity:.6; cursor:default}
.loading{min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--muted); font-family:'Inter',sans-serif; font-size:14px}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:880px){.kpis{grid-template-columns:repeat(2,1fr)}.cols{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}.hide-sm{display:none}}
</style>

<body>
<div id="app"><div class="loading">Cargando…</div></div>

<!-- =============================================================
     CONFIGURACIÓN: pega aquí tus dos claves de Supabase
     (ver guía CONFIGURACION.md, paso 3)
============================================================= -->
<script>
  const SUPABASE_URL = "PEGA_AQUI_TU_PROJECT_URL";
  const SUPABASE_ANON_KEY = "PEGA_AQUI_TU_ANON_KEY";
</script>

<script type="module">
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const eur=n=>(n||0).toLocaleString('es-ES',{style:'currency',currency:'EUR',maximumFractionDigits:0});
const eur2=n=>(n||0).toLocaleString('es-ES',{style:'currency',currency:'EUR'});
const norm=s=>(s||'').toString().trim();
const key=s=>norm(s).toLowerCase().replace(/\s+/g,' ');
const TODAY=new Date();
const app=$('#app');

let invoices=[], clients={}, q='', sortBy='deuda', sortDir=-1;
let sb=null, session=null;

function statusOf(d){ if(d>=90) return 'crit'; if(d>=30) return 'mora'; return 'pend'; }
const STLABEL={crit:'Crítico',mora:'Mora',pend:'Pendiente'};
const STCOLOR={crit:'#E53E3E',mora:'#F6AD55',pend:'#3b6fe0'};

// Prioridad de seguimiento (0 = sin clasificar, 1..4 estrellas)
const PRIO=[
  {v:0,label:'Sin clasificar'},
  {v:1,label:'Baja'},
  {v:2,label:'Media'},
  {v:3,label:'Alta'},
  {v:4,label:'Crítica'}
];
function stars(n){ n=n||0; return '★★★★'.slice(0,n)+'☆☆☆☆'.slice(0,4-n); }

const configured = SUPABASE_URL.startsWith('http') && SUPABASE_ANON_KEY.length>20;

async function boot(){
  if(!configured){ renderSetupNeeded(); return; }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { data } = await sb.auth.getSession();
  session = data.session;
  sb.auth.onAuthStateChange((_e,s)=>{ session=s; if(session){ afterLogin(); } else { renderLogin(); } });
  if(session) afterLogin(); else renderLogin();
}

async function afterLogin(){
  app.innerHTML='<div class="loading">Cargando datos…</div>';
  await loadData();
  render();
}

async function loadData(){
  invoices=[]; clients={};
  try{
    const { data:inv } = await sb.from('invoices').select('data').order('id',{ascending:true});
    if(inv && inv.length) invoices = inv.map(r=>r.data);
    const { data:cl } = await sb.from('clients').select('client_key,data');
    if(cl) cl.forEach(r=>{ clients[r.client_key]=r.data; });
  }catch(e){ console.error('loadData',e); }
}

async function replaceInvoices(list){
  await sb.from('invoices').delete().neq('id',-1);
  if(list.length){
    for(let i=0;i<list.length;i+=200){
      const ch=list.slice(i,i+200);
      await sb.from('invoices').insert(ch.map(d=>({data:d})));
    }
  }
}

async function saveClient(k,obj){
  await sb.from('clients').upsert({client_key:k, data:obj}, {onConflict:'client_key'});
}

function parseFile(file){
  const rd=new FileReader();
  rd.onload=async e=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames.includes('Holded')?'Holded':wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
    let h=rows.findIndex(r=>r&&r.some(c=>key(c)==='cliente'));
    if(h<0)h=0;
    const head=rows[h].map(c=>key(c));
    const col=(...names)=>{for(const n of names){const i=head.indexOf(n); if(i>=0)return i;} return -1;};
    const ci=col('cliente'),cp=col('pendiente'),ct=col('total'),cn=col('num','nº','numero'),
      cd=col('descripción','descripcion','concepto'),cv=col('vencimiento'),cpago=col('f.pago','forma de pago'),
      ce=col('estado'),cf=col('fecha');
    const toDate=v=>{ if(v instanceof Date&&!isNaN(v))return v; if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400000));return isNaN(d)?null:d;} const d=new Date(v); return isNaN(d)?null:d; };
    const fmt=v=>{const d=toDate(v); return d?d.toLocaleDateString('es-ES'):(v?norm(v):'');};
    const days=v=>{const d=toDate(v); return d?Math.max(0,Math.round((TODAY-d)/86400000)):0;};
    const out=[];
    for(let i=h+1;i<rows.length;i++){
      const r=rows[i]; if(!r)continue;
      const cliente=norm(r[ci]); const pend=parseFloat(r[cp]);
      if(!cliente||isNaN(pend)||pend<=0)continue;
      out.push({cliente,pendiente:pend,total:parseFloat(r[ct])||pend,num:norm(r[cn]),desc:norm(r[cd]),
        venc:fmt(r[cv]),dias:days(r[cv]),pago:norm(r[cpago]),estado:norm(r[ce])||'Vencido',fecha:fmt(r[cf])});
    }
    app.innerHTML='<div class="loading">Guardando en la nube…</div>';
    invoices=out;
    await replaceInvoices(out);
    render();
  };
  rd.readAsArrayBuffer(file);
}

// Detecta facturas que NO son deuda real (subvención Kit Digital).
// Se identifican por el concepto, no por el importe (que varía: 600, 2000, 2420…).
function isKitDigital(inv){ return /kit\s*digital/i.test(inv.desc||''); }

function aggregate(){
  const m={};
  for(const inv of invoices){
    if(isKitDigital(inv)) continue;            // excluidas del control de deuda
    const k=key(inv.cliente);
    if(!m[k])m[k]={key:k,name:inv.cliente,deuda:0,facturas:0,maxdias:0,items:[]};
    m[k].deuda+=inv.pendiente; m[k].facturas++; m[k].maxdias=Math.max(m[k].maxdias,inv.dias); m[k].items.push(inv);
  }
  return Object.values(m).map(c=>({...c,st:statusOf(c.maxdias)}));
}

// Facturas Kit Digital (listado aparte), agregadas por cliente
function aggregateKit(){
  const m={};
  for(const inv of invoices){
    if(!isKitDigital(inv)) continue;
    const k=key(inv.cliente);
    if(!m[k])m[k]={key:k,name:inv.cliente,deuda:0,facturas:0,items:[]};
    m[k].deuda+=inv.pendiente; m[k].facturas++; m[k].items.push(inv);
  }
  return Object.values(m).sort((a,b)=>b.deuda-a.deuda);
}

function renderSetupNeeded(){
  app.innerHTML=`<div class="head"><div class="top"><div><h1>Control de Impagados</h1><p class="sub">Configuración pendiente</p></div></div></div>
  <div class="banner"><b>Falta configurar la conexión a Supabase.</b><br><br>
  Abre el archivo <code>index.html</code> con un editor de texto y, cerca del final, pega tu <code>Project URL</code> y tu <code>anon key</code> en las líneas
  <code>SUPABASE_URL</code> y <code>SUPABASE_ANON_KEY</code>. Tienes los pasos detallados en el archivo <code>CONFIGURACION.md</code>.</div>`;
}

function renderLogin(){
  app.innerHTML=`<div class="login"><div class="lcard">
    <div class="lhead"><h1>Control de Impagados</h1><p>Playoff Informàtica · acceso privado</p></div>
    <div class="lbody">
      <div class="lerr" id="lerr"></div>
      <label>Email</label><input class="fld" id="lemail" type="email" autocomplete="username" placeholder="tu@email.com">
      <label>Contraseña</label><input class="fld" id="lpass" type="password" autocomplete="current-password" placeholder="••••••••">
      <button class="lbtn" id="lbtn">Entrar</button>
    </div>
  </div></div>`;
  const err=$('#lerr'), btn=$('#lbtn');
  const doLogin=async()=>{
    err.classList.remove('show');
    const email=$('#lemail').value.trim(), pass=$('#lpass').value;
    if(!email||!pass){ err.textContent='Introduce email y contraseña.'; err.classList.add('show'); return; }
    btn.disabled=true; btn.textContent='Entrando…';
    const { error } = await sb.auth.signInWithPassword({email,password:pass});
    if(error){ err.textContent='Email o contraseña incorrectos.'; err.classList.add('show'); btn.disabled=false; btn.textContent='Entrar'; }
  };
  btn.onclick=doLogin;
  $('#lpass').onkeydown=e=>{ if(e.key==='Enter') doLogin(); };
  $('#lemail').focus();
}

function render(){
  const agg=aggregate();
  const total=agg.reduce((s,c)=>s+c.deuda,0);
  const max=agg.length?Math.max(...agg.map(c=>c.deuda)):1;
  const crit=agg.filter(c=>c.st==='crit').length;
  const maxdias=agg.length?Math.max(...agg.map(c=>c.maxdias)):0;
  const top=[...agg].sort((a,b)=>b.deuda-a.deuda).slice(0,8);
  const fillFor=v=>{const t=v/max; const g=t>.66?'#E53E3E,#c0392b':t>.33?'#F6AD55,#e8893a':'#5b8def,#3b6fe0'; return `linear-gradient(90deg,${g})`;};
  const tramos=[['0–100€',0,100],['100–250€',100,250],['250–500€',250,500],['500–1k€',500,1000],['>1k€',1000,1e12]];
  const dist=tramos.map(([l,a,b])=>({l,n:agg.filter(c=>c.deuda>=a&&c.deuda<b).length}));
  const distMax=Math.max(1,...dist.map(d=>d.n));
  const stCount={crit:0,mora:0,pend:0}; agg.forEach(c=>stCount[c.st]++);
  const stTotal=agg.length||1;
  const kitAll=invoices.filter(isKitDigital);
  const kitTotal=kitAll.reduce((s,inv)=>s+inv.pendiente,0);
  const kitCount=kitAll.length;
  const uemail=session&&session.user?session.user.email:'';

  app.innerHTML=`
  <div class="head">
    <div class="top">
      <div><h1>Control de Impagados</h1><p class="sub">Playoff Informàtica · seguimiento de cobros pendientes</p></div>
      <div class="tools">
        ${uemail?`<span class="uemail">${uemail}</span>`:''}
        <button class="btn primary" id="up">Cargar Excel</button>
        <input type="file" id="file" accept=".xlsx,.xls" style="display:none">
        ${invoices.length?`<button class="btn ghost sm" id="clear">Vaciar datos</button>`:''}
        <button class="btn ghost sm" id="logout">Salir</button>
      </div>
    </div>
    ${invoices.length?`
    <div class="kpis">
      <div class="kpi alert"><div class="v">${eur(total)}</div><div class="l">Deuda total pendiente</div></div>
      <div class="kpi"><div class="v">${agg.length}</div><div class="l">Clientes con deuda</div></div>
      <div class="kpi amber"><div class="v">${crit}</div><div class="l">Clientes críticos (+90d)</div></div>
      <div class="kpi"><div class="v">${maxdias} d</div><div class="l">Antigüedad máxima</div></div>
      ${kitCount?`<div class="kpi kit"><div class="v">${eur(kitTotal)}</div><div class="l">Kit Digital · ${kitCount} factura${kitCount>1?'s':''}</div></div>`:''}
    </div>`:''}
  </div>
  <div class="wrap">
  ${invoices.length?`
    <div class="cols">
      <div class="section">
        <h2>Ranking de deuda</h2>
        <p class="desc">Top clientes por importe pendiente. La intensidad de la barra refleja el riesgo.</p>
        <div class="rk">
          ${top.map((c,i)=>`<div class="rkrow" data-k="${c.key}">
            <div class="pos">${i+1}</div>
            <div class="body"><div class="nm">${c.name}</div><div class="track"><div class="fill" style="width:${Math.max(5,c.deuda/max*100)}%;background:${fillFor(c.deuda)}"></div></div></div>
            <div class="val">${eur(c.deuda)}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="section">
        <h2>Distribución</h2>
        <p class="desc">Clientes por tramo de deuda y por estado de mora.</p>
        <div class="bars">
          ${dist.map(d=>`<div class="bc"><div class="cnt">${d.n}</div><div class="col" style="height:${d.n/distMax*100}%"></div><div class="lbl">${d.l}</div></div>`).join('')}
        </div>
        <div style="height:1px;background:var(--line);margin:18px 0"></div>
        ${donut(stCount,stTotal)}
      </div>
    </div>
    <div class="section">
      <h2>Listado de clientes</h2>
      <div class="tbar">
        <input class="search" id="search" placeholder="Buscar cliente, email o teléfono..." value="${q.replace(/"/g,'&quot;')}">
        <span class="desc" style="margin:0">${agg.length} clientes · ${invoices.length} facturas</span>
      </div>
      <table>
        <thead><tr>
          <th data-s="name">Cliente ${arrow('name')}</th>
          <th class="c" data-s="prio">Prioridad ${arrow('prio')}</th>
          <th class="c hide-sm" data-s="st">Estado ${arrow('st')}</th>
          <th class="c" data-s="facturas">Facturas ${arrow('facturas')}</th>
          <th class="c" data-s="maxdias">Días mora ${arrow('maxdias')}</th>
          <th class="r" data-s="deuda">Deuda ${arrow('deuda')}</th>
        </tr></thead>
        <tbody id="tbody">${rowsHtml(agg)}</tbody>
      </table>
    </div>
    ${kitSection()}
  `:`
    <div class="empty">
      <div class="big">📊</div>
      <b>Aún no hay datos cargados</b><br><br>
      Pulsa <b>Cargar Excel</b> para importar tu listado de facturas pendientes desde Holded.<br>
      <span style="font-size:12px">Los datos se guardan en la nube y se ven desde cualquier equipo. Las fichas de contacto se conservan al cargar un Excel nuevo.</span>
    </div>
  `}
  </div>`;

  $('#up').onclick=()=>$('#file').click();
  $('#file').onchange=e=>{if(e.target.files[0])parseFile(e.target.files[0]);};
  $('#logout').onclick=async()=>{ await sb.auth.signOut(); };
  const cl=$('#clear'); if(cl)cl.onclick=async()=>{if(confirm('¿Vaciar las facturas cargadas? Las fichas de contacto se conservan.')){ app.innerHTML='<div class="loading">Vaciando…</div>'; invoices=[]; await replaceInvoices([]); render();}};
  const s=$('#search'); if(s){s.oninput=e=>{q=e.target.value.toLowerCase(); const p=e.target.selectionStart; refreshTable(); const ns=$('#search'); if(ns){ns.focus();ns.setSelectionRange(p,p);}};}
  $$('th[data-s]').forEach(th=>th.onclick=()=>{const ss=th.dataset.s; if(sortBy===ss)sortDir*=-1; else{sortBy=ss; sortDir=(ss==='name')?1:-1;} render();});
  bindRows();
}

function arrow(s){return sortBy===s?`<span class="ar">${sortDir>0?'▲':'▼'}</span>`:'';}

function kitSection(){
  const kit=aggregateKit();
  if(!kit.length) return '';
  const totalKit=kit.reduce((s,c)=>s+c.deuda,0);
  const numFact=kit.reduce((s,c)=>s+c.facturas,0);
  return `<div class="section" style="border-style:dashed">
    <h2>Kit Digital · subvencionado <span style="font-weight:400;color:var(--muted);font-size:12px">(no es deuda real)</span></h2>
    <p class="desc">Facturas financiadas por el programa Kit Digital (Next Generation EU). Se muestran aparte y <b>no</b> cuentan en los KPIs ni en el ranking de deuda. Total subvencionado pendiente: <b>${eur2(totalKit)}</b> · ${numFact} factura(s) · ${kit.length} cliente(s).</p>
    <table>
      <thead><tr><th>Cliente</th><th class="c">Facturas</th><th class="r">Importe subvencionado</th></tr></thead>
      <tbody>${kit.map(c=>`<tr class="trow" data-kk="${c.key}"><td><div class="cname"><span class="dot" style="background:var(--green)"></span>${c.name}</div></td><td class="c">${c.facturas}</td><td class="r amt" style="color:var(--green)">${eur2(c.deuda)}</td></tr>`).join('')}</tbody>
    </table>
  </div>`;
}

function rowsHtml(agg){
  let list=agg.filter(c=>{const f=clients[c.key]||{}; return !q||c.name.toLowerCase().includes(q)||key(f.email||'').includes(q)||(f.tel||'').toLowerCase().includes(q);});
  list=list.map(c=>({...c, prio:(clients[c.key]&&clients[c.key].prio)||0}));
  list.sort((a,b)=>{let av=a[sortBy],bv=b[sortBy]; if(typeof av==='string'){return av.localeCompare(bv)*sortDir;} return ((av||0)-(bv||0))*sortDir;});
  if(!list.length)return `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">Sin resultados para "${q}"</td></tr>`;
  return list.map(c=>{
    const f=clients[c.key]||{}; const hasC=f.tel||f.email; const hasN=f.notas;
    const pr=c.prio||0;
    const prCell=pr?`<span title="${PRIO[pr].label}" style="color:#f6b73c;letter-spacing:1px;font-size:13px">${'★'.repeat(pr)}</span>`:`<span style="color:var(--line);font-size:13px">—</span>`;
    return `<tr class="trow" data-k="${c.key}">
      <td><div class="cname"><span class="dot" style="background:${STCOLOR[c.st]}"></span>${c.name}${hasC?' <span class="ic" title="Contacto">📞</span>':''}${hasN?' <span class="ic" title="Notas">📝</span>':''}</div></td>
      <td class="c">${prCell}</td>
      <td class="c hide-sm"><span class="pill ${c.st}">${STLABEL[c.st]}</span></td>
      <td class="c">${c.facturas}</td>
      <td class="c">${c.maxdias}</td>
      <td class="r amt big">${eur2(c.deuda)}</td>
    </tr>`;
  }).join('');
}
function refreshTable(){const tb=$('#tbody'); if(tb){tb.innerHTML=rowsHtml(aggregate()); bindRows();}}
function bindRows(){$$('.trow').forEach(r=>r.onclick=()=>openClient(r.dataset.k||r.dataset.kk)); $$('.rkrow').forEach(r=>r.onclick=()=>openClient(r.dataset.k));}

function donut(c,total){
  const segs=[['crit',c.crit],['mora',c.mora],['pend',c.pend]].filter(s=>s[1]>0);
  const R=42,C=2*Math.PI*R; let off=0;
  const circles=segs.map(([k,n])=>{const len=n/total*C; const el=`<circle r="${R}" cx="60" cy="60" fill="none" stroke="${STCOLOR[k]}" stroke-width="16" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 60 60)"/>`; off+=len; return el;}).join('');
  const leg=[['crit','Crítico'],['mora','Mora'],['pend','Pendiente']].map(([k,l])=>`<div class="di"><span class="sw" style="background:${STCOLOR[k]}"></span>${l}<span><b>${c[k]}</b></span></div>`).join('');
  return `<div class="donut-wrap"><svg class="donut" width="120" height="120" viewBox="0 0 120 120">${circles}<text x="60" y="58" text-anchor="middle" font-family="Space Grotesk" font-weight="700" font-size="22" fill="#1a2438">${total}</text><text x="60" y="74" text-anchor="middle" font-size="9" fill="#6b7896">clientes</text></svg><div class="dleg">${leg}</div></div>`;
}

function openClient(k){
  const c=aggregate().find(x=>x.key===k) || aggregateKit().find(x=>x.key===k); if(!c)return;
  const f=clients[k]||{};
  const ov=document.createElement('div'); ov.className='ov';
  ov.innerHTML=`<div class="modal">
    <div class="mhead"><button class="close" id="x">×</button><h3>${c.name}</h3><p class="csub">Ficha de cliente · seguimiento de cobro</p></div>
    <div class="mbody">
      <div class="mk3">
        <div class="mk"><div class="v" style="color:var(--red)">${eur2(c.deuda)}</div><div class="l">Deuda pendiente</div></div>
        <div class="mk"><div class="v">${c.facturas}</div><div class="l">Facturas</div></div>
        <div class="mk"><div class="v">${c.maxdias||0} d</div><div class="l">Mora máxima</div></div>
      </div>
      <div class="grid2">
        <div><label>Teléfono</label><input class="fld" id="tel" value="${(f.tel||'').replace(/"/g,'&quot;')}" placeholder="+34 ..."></div>
        <div><label>Email</label><input class="fld" id="email" value="${(f.email||'').replace(/"/g,'&quot;')}" placeholder="contacto@..."></div>
      </div>
      <div style="margin-bottom:14px"><label>Persona de contacto</label><input class="fld" id="contacto" value="${(f.contacto||'').replace(/"/g,'&quot;')}" placeholder="Nombre del responsable"></div>
      <div style="margin-bottom:14px"><label>Prioridad de seguimiento</label><select class="fld" id="prio">${PRIO.map(p=>`<option value="${p.v}" ${(f.prio||0)===p.v?'selected':''}>${p.v?stars(p.v)+'  ':''}${p.label}</option>`).join('')}</select></div>
      <div style="margin-bottom:14px"><label>Notas de seguimiento</label><textarea class="fld" id="notas" placeholder="Llamadas, compromisos de pago, incidencias...">${f.notas||''}</textarea></div>
      <div class="saverow"><span class="saved" id="sv">✓ Ficha guardada</span><button class="btn primary" id="save" style="background:var(--navy);color:#fff">Guardar ficha</button></div>
      <details><summary>Ver ${c.facturas} factura(s) pendiente(s)</summary>
        <table class="ftable"><thead><tr><th>Nº</th><th>Concepto</th><th>Vencimiento</th><th class="c">Días</th><th class="r">Pendiente</th></tr></thead>
        <tbody>${[...c.items].sort((a,b)=>b.pendiente-a.pendiente).map(it=>`<tr><td>${it.num||'-'}</td><td>${(it.desc||'-').slice(0,38)}</td><td>${it.venc||'-'}</td><td class="c">${it.dias}</td><td class="r amt">${eur2(it.pendiente)}</td></tr>`).join('')}</tbody></table>
      </details>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>{ov.remove(); render();};
  $('#x',ov).onclick=close; ov.onclick=e=>{if(e.target===ov)close();};
  $('#save',ov).onclick=async()=>{
    const obj={tel:$('#tel',ov).value.trim(),email:$('#email',ov).value.trim(),contacto:$('#contacto',ov).value.trim(),prio:parseInt($('#prio',ov).value,10)||0,notas:$('#notas',ov).value,name:c.name};
    clients[k]=obj;
    const sv=$('#sv',ov); const btn=$('#save',ov); btn.disabled=true; btn.textContent='Guardando…';
    await saveClient(k,obj);
    btn.disabled=false; btn.textContent='Guardar ficha';
    sv.classList.add('show'); setTimeout(()=>sv.classList.remove('show'),1600);
  };
}

boot();
</script>
</body>
</html>
