<body>
<div id="app"><div class="loading">Cargando…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  onAuthStateChanged,
  signInWithPopup,
  signInWithRedirect,
  signOut
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import {
  collection,
  doc,
  getDocs,
  getFirestore,
  onSnapshot,
  setDoc,
  writeBatch
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const eur=n=>(n||0).toLocaleString('es-ES',{style:'currency',currency:'EUR',maximumFractionDigits:0});
const eur2=n=>(n||0).toLocaleString('es-ES',{style:'currency',currency:'EUR'});
const norm=s=>(s||'').toString().trim();
const key=s=>norm(s).toLowerCase().replace(/\s+/g,' ');
const TODAY=new Date();
const app=$('#app');

let invoices=[], clients={}, q='', sortBy='deuda', sortDir=-1;
let auth=null, db=null, user=null;
let stopInvoices=null, stopClients=null;
const SHARED_WORKSPACE='control-impagados';

const invoicesRef=()=>collection(db,'workspaces',SHARED_WORKSPACE,'invoices');
const clientsRef=()=>collection(db,'workspaces',SHARED_WORKSPACE,'clients');

function stopRealtime(){
  if(stopInvoices)stopInvoices();
  if(stopClients)stopClients();
  stopInvoices=null; stopClients=null;
}

function statusOf(d){ if(d>=90) return 'crit'; if(d>=30) return 'mora'; return 'pend'; }
const STLABEL={crit:'Crítico',mora:'Mora',pend:'Pendiente'};
const STCOLOR={crit:'#E53E3E',mora:'#F6AD55',pend:'#3b6fe0'};

// Prioridad de seguimiento (0 = sin clasificar, 1..4 estrellas)
const PRIO=[
  {v:0,label:'Sin clasificar'},
  {v:1,label:'Baja'},
  {v:2,label:'Media'},
  {v:3,label:'Alta'},
  {v:4,label:'Crítica'}
];
function stars(n){ n=n||0; return '★★★★'.slice(0,n)+'☆☆☆☆'.slice(0,4-n); }

const configured = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith('PEGA_')
  && firebaseConfig.projectId && !firebaseConfig.projectId.startsWith('PEGA_');

async function boot(){
  if(!configured){ renderSetupNeeded(); return; }
  const firebaseApp = initializeApp(firebaseConfig);
  auth = getAuth(firebaseApp);
  db = getFirestore(firebaseApp);
  onAuthStateChanged(auth,async currentUser=>{
    stopRealtime();
    user=currentUser;
    if(user) await afterLogin(); else renderLogin();
  });
}

async function afterLogin(){
  app.innerHTML='<div class="loading">Cargando datos…</div>';
  await loadData();
  render();
  startRealtime();
}

async function loadData(){
  invoices=[]; clients={};
  try{
    const inv = await getDocs(invoicesRef());
    invoices = inv.docs.map(snapshot=>snapshot.data());
    const cl = await getDocs(clientsRef());
    cl.forEach(snapshot=>{
      const data=snapshot.data();
      clients[data.clientKey]=data.profile;
    });
  }catch(e){ console.error('loadData',e); }
}

function startRealtime(){
  stopInvoices=onSnapshot(invoicesRef(),snapshot=>{
    invoices=snapshot.docs.map(item=>item.data());
    render();
  },error=>console.error('invoices realtime',error));
  stopClients=onSnapshot(clientsRef(),snapshot=>{
    clients={};
    snapshot.forEach(item=>{
      const data=item.data();
      clients[data.clientKey]=data.profile;
    });
    render();
  },error=>console.error('clients realtime',error));
}

async function replaceInvoices(list){
  const ref=invoicesRef();
  const existing=await getDocs(ref);
  for(let i=0;i<existing.docs.length;i+=400){
    const batch=writeBatch(db);
    existing.docs.slice(i,i+400).forEach(snapshot=>batch.delete(snapshot.ref));
    await batch.commit();
  }
  for(let i=0;i<list.length;i+=400){
    const batch=writeBatch(db);
    list.slice(i,i+400).forEach(item=>batch.set(doc(ref),item));
    await batch.commit();
  }
}

async function saveClient(k,obj){
  await setDoc(
    doc(clientsRef(),encodeURIComponent(k)),
    {clientKey:k,profile:obj,updatedAt:new Date().toISOString()}
  );
}

function parseFile(file){
  const rd=new FileReader();
  rd.onload=async e=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames.includes('Holded')?'Holded':wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
    let h=rows.findIndex(r=>r&&r.some(c=>key(c)==='cliente'));
    if(h<0)h=0;
    const head=rows[h].map(c=>key(c));
    const col=(...names)=>{for(const n of names){const i=head.indexOf(n); if(i>=0)return i;} return -1;};
    const ci=col('cliente'),cp=col('pendiente'),ct=col('total'),cn=col('num','nº','numero'),
      cd=col('descripción','descripcion','concepto'),cv=col('vencimiento'),cpago=col('f.pago','forma de pago'),
      ce=col('estado'),cf=col('fecha');
    const toDate=v=>{ if(v instanceof Date&&!isNaN(v))return v; if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400000));return isNaN(d)?null:d;} const d=new Date(v); return isNaN(d)?null:d; };
    const fmt=v=>{const d=toDate(v); return d?d.toLocaleDateString('es-ES'):(v?norm(v):'');};
    const days=v=>{const d=toDate(v); return d?Math.max(0,Math.round((TODAY-d)/86400000)):0;};
    const out=[];
    for(let i=h+1;i<rows.length;i++){
      const r=rows[i]; if(!r)continue;
      const cliente=norm(r[ci]); const pend=parseFloat(r[cp]);
      if(!cliente||isNaN(pend)||pend<=0)continue;
      out.push({cliente,pendiente:pend,total:parseFloat(r[ct])||pend,num:norm(r[cn]),desc:norm(r[cd]),
        venc:fmt(r[cv]),dias:days(r[cv]),pago:norm(r[cpago]),estado:norm(r[ce])||'Vencido',fecha:fmt(r[cf])});
    }
    app.innerHTML='<div class="loading">Guardando en la nube…</div>';
    invoices=out;
    await replaceInvoices(out);
    render();
  };
  rd.readAsArrayBuffer(file);
}

// Detecta facturas que NO son deuda real (subvención Kit Digital).
// Se identifican por el concepto, no por el importe (que varía: 600, 2000, 2420…).
function isKitDigital(inv){ return /kit\s*digital/i.test(inv.desc||''); }

function aggregate(){
  const m={};
  for(const inv of invoices){
    if(isKitDigital(inv)) continue;            // excluidas del control de deuda
    const k=key(inv.cliente);
    if(!m[k])m[k]={key:k,name:inv.cliente,deuda:0,facturas:0,maxdias:0,items:[]};
    m[k].deuda+=inv.pendiente; m[k].facturas++; m[k].maxdias=Math.max(m[k].maxdias,inv.dias); m[k].items.push(inv);
  }
  return Object.values(m).map(c=>({...c,st:statusOf(c.maxdias)}));
}

// Facturas Kit Digital (listado aparte), agregadas por cliente
function aggregateKit(){
  const m={};
  for(const inv of invoices){
    if(!isKitDigital(inv)) continue;
    const k=key(inv.cliente);
    if(!m[k])m[k]={key:k,name:inv.cliente,deuda:0,facturas:0,items:[]};
    m[k].deuda+=inv.pendiente; m[k].facturas++; m[k].items.push(inv);
  }
  return Object.values(m).sort((a,b)=>b.deuda-a.deuda);
}

function renderSetupNeeded(){
  app.innerHTML=`<div class="head"><div class="top"><div class="head-brand"><img src="./logo-playoff-white.svg" alt="Playoff"><div class="head-brand-copy"><h1>Control de Impagados</h1><p class="sub">Configuración pendiente</p></div></div></div></div>
  <div class="banner"><b>Falta configurar la conexión a Firebase.</b><br><br>
  Abre <code>firebase-config.js</code> y pega la configuración de tu aplicación web de Firebase.
  Tienes los pasos detallados en <code>CONFIGURACION.md</code>.</div>`;
}

function renderLogin(){
  app.innerHTML=`<section class="login">
    <header class="login-head"><img src="./logo-playoff.svg" alt="Playoff"></header>
    <main class="login-main">
      <div class="lcard">
        <div class="lmark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M7 10V8a5 5 0 0 1 10 0v2M6.5 10h11A1.5 1.5 0 0 1 19 11.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 5 18.5v-7A1.5 1.5 0 0 1 6.5 10Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M12 14v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </div>
        <div class="lhead">
          <h1>Control de Impagados</h1>
          <p>Accede al seguimiento de cobros de Playoff Informática.</p>
        </div>
        <div class="lbody">
          <div class="lerr" id="lerr" role="alert"></div>
          <button class="lbtn" id="lbtn">
            <svg class="google-mark" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M21.6 12.2c0-.7-.1-1.5-.2-2.2H12v4.3h5.4a4.6 4.6 0 0 1-2 3v2.8h3.3c1.9-1.8 2.9-4.4 2.9-7.9Z"/><path fill="#34A853" d="M12 22c2.7 0 5-.9 6.7-2.4l-3.3-2.7c-.9.6-2.1 1-3.4 1a5.9 5.9 0 0 1-5.5-4.1H3.1v2.8A10 10 0 0 0 12 22Z"/><path fill="#FBBC05" d="M6.5 13.8A6 6 0 0 1 6.2 12c0-.6.1-1.2.3-1.8V7.4H3.1A10 10 0 0 0 2 12c0 1.7.4 3.2 1.1 4.6l3.4-2.8Z"/><path fill="#EA4335" d="M12 6.1c1.5 0 2.8.5 3.9 1.5l2.9-2.9A9.8 9.8 0 0 0 12 2a10 10 0 0 0-8.9 5.4l3.4 2.8A5.9 5.9 0 0 1 12 6.1Z"/></svg>
            <span>Continuar con Google</span>
          </button>
          <p class="lprivacy">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3 5 6v5c0 4.8 2.9 8.4 7 10 4.1-1.6 7-5.2 7-10V6l-7-3Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
            Acceso privado y protegido por Google
          </p>
        </div>
      </div>
    </main>
    <footer class="login-foot">© Playoff Informática S.L.</footer>
  </section>`;
  const err=$('#lerr'), btn=$('#lbtn');
  const doLogin=async()=>{
    err.classList.remove('show');
    btn.disabled=true; btn.textContent='Abriendo Google…';
    try{
      await signInWithPopup(auth,new GoogleAuthProvider());
    }catch(error){
      if(error.code==='auth/popup-blocked' || error.code==='auth/operation-not-supported-in-this-environment'){
        await signInWithRedirect(auth,new GoogleAuthProvider());
        return;
      }
      if(error.code!=='auth/popup-closed-by-user'){
        err.textContent='No se pudo iniciar sesión con Google. Revisa la configuración de Firebase.';
        err.classList.add('show');
      }
      btn.disabled=false; btn.textContent='Continuar con Google';
    }
  };
  btn.onclick=doLogin;
}

function render(){
  const agg=aggregate();
  const total=agg.reduce((s,c)=>s+c.deuda,0);
  const max=agg.length?Math.max(...agg.map(c=>c.deuda)):1;
  const crit=agg.filter(c=>c.st==='crit').length;
  const maxdias=agg.length?Math.max(...agg.map(c=>c.maxdias)):0;
  const top=[...agg].sort((a,b)=>b.deuda-a.deuda).slice(0,8);
  const fillFor=v=>{const t=v/max; const g=t>.66?'#E5484D,#C9363C':t>.33?'#F59E0B,#D98200':'#3B82F6,#1469E6'; return `linear-gradient(90deg,${g})`;};
  const tramos=[['0–100€',0,100],['100–250€',100,250],['250–500€',250,500],['500–1k€',500,1000],['>1k€',1000,1e12]];
  const dist=tramos.map(([l,a,b])=>({l,n:agg.filter(c=>c.deuda>=a&&c.deuda<b).length}));
  const distMax=Math.max(1,...dist.map(d=>d.n));
  const stCount={crit:0,mora:0,pend:0}; agg.forEach(c=>stCount[c.st]++);
  const stTotal=agg.length||1;
  const kitAll=invoices.filter(isKitDigital);
  const kitTotal=kitAll.reduce((s,inv)=>s+inv.pendiente,0);
  const kitCount=kitAll.length;
  const uemail=user&&user.email?user.email:'';

  app.innerHTML=`
  <div class="head">
    <div class="top">
      <div class="head-brand">
        <img src="./logo-playoff-white.svg" alt="Playoff">
        <div class="head-brand-copy"><h1>Control de Impagados</h1><p class="sub">Seguimiento de cobros pendientes</p></div>
      </div>
      <div class="tools">
        ${uemail?`<span class="uemail">${uemail}</span>`:''}
        <button class="btn primary" id="up">Cargar Excel</button>
        <input type="file" id="file" accept=".xlsx,.xls" style="display:none">
        ${invoices.length?`<button class="btn ghost sm" id="clear">Vaciar datos</button>`:''}
        <button class="btn ghost sm" id="logout">Salir</button>
      </div>
    </div>
    ${invoices.length?`
    <div class="kpis">
      <div class="kpi alert"><div class="v">${eur(total)}</div><div class="l">Deuda total pendiente</div></div>
      <div class="kpi"><div class="v">${agg.length}</div><div class="l">Clientes con deuda</div></div>
      <div class="kpi amber"><div class="v">${crit}</div><div class="l">Clientes críticos (+90d)</div></div>
      <div class="kpi"><div class="v">${maxdias} d</div><div class="l">Antigüedad máxima</div></div>
      ${kitCount?`<div class="kpi kit"><div class="v">${eur(kitTotal)}</div><div class="l">Kit Digital · ${kitCount} factura${kitCount>1?'s':''}</div></div>`:''}
    </div>`:''}
  </div>
  <div class="wrap">
  ${invoices.length?`
    <div class="cols">
      <div class="section">
        <h2>Ranking de deuda</h2>
        <p class="desc">Top clientes por importe pendiente. La intensidad de la barra refleja el riesgo.</p>
        <div class="rk">
          ${top.map((c,i)=>`<div class="rkrow" data-k="${c.key}">
            <div class="pos">${i+1}</div>
            <div class="body"><div class="nm">${c.name}</div><div class="track"><div class="fill" style="width:${Math.max(5,c.deuda/max*100)}%;background:${fillFor(c.deuda)}"></div></div></div>
            <div class="val">${eur(c.deuda)}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="section">
        <h2>Distribución</h2>
        <p class="desc">Clientes por tramo de deuda y por estado de mora.</p>
        <div class="bars">
          ${dist.map(d=>`<div class="bc"><div class="cnt">${d.n}</div><div class="col" style="height:${d.n/distMax*100}%"></div><div class="lbl">${d.l}</div></div>`).join('')}
        </div>
        <div style="height:1px;background:var(--line);margin:18px 0"></div>
        ${donut(stCount,stTotal)}
      </div>
    </div>
    <div class="section">
      <h2>Listado de clientes</h2>
      <div class="tbar">
        <input class="search" id="search" placeholder="Buscar cliente, email o teléfono..." value="${q.replace(/"/g,'&quot;')}">
        <span class="desc" style="margin:0">${agg.length} clientes · ${invoices.length} facturas</span>
      </div>
      <table>
        <thead><tr>
          <th data-s="name">Cliente ${arrow('name')}</th>
          <th class="c" data-s="prio">Prioridad ${arrow('prio')}</th>
          <th class="c hide-sm" data-s="st">Estado ${arrow('st')}</th>
          <th class="c" data-s="facturas">Facturas ${arrow('facturas')}</th>
          <th class="c" data-s="maxdias">Días mora ${arrow('maxdias')}</th>
          <th class="r" data-s="deuda">Deuda ${arrow('deuda')}</th>
        </tr></thead>
        <tbody id="tbody">${rowsHtml(agg)}</tbody>
      </table>
    </div>
    ${kitSection()}
  `:`
    <div class="empty">
      <div class="big">📊</div>
      <b>Aún no hay datos cargados</b><br><br>
      Pulsa <b>Cargar Excel</b> para importar tu listado de facturas pendientes desde Holded.<br>
      <span style="font-size:12px">Los datos se guardan en la nube y se ven desde cualquier equipo. Las fichas de contacto se conservan al cargar un Excel nuevo.</span>
    </div>
  `}
  </div>`;

  $('#up').onclick=()=>$('#file').click();
  $('#file').onchange=e=>{if(e.target.files[0])parseFile(e.target.files[0]);};
  $('#logout').onclick=async()=>{ await signOut(auth); };
  const cl=$('#clear'); if(cl)cl.onclick=async()=>{if(confirm('¿Vaciar las facturas cargadas? Las fichas de contacto se conservan.')){ app.innerHTML='<div class="loading">Vaciando…</div>'; invoices=[]; await replaceInvoices([]); render();}};
  const s=$('#search'); if(s){s.oninput=e=>{q=e.target.value.toLowerCase(); const p=e.target.selectionStart; refreshTable(); const ns=$('#search'); if(ns){ns.focus();ns.setSelectionRange(p,p);}};}
  $$('th[data-s]').forEach(th=>th.onclick=()=>{const ss=th.dataset.s; if(sortBy===ss)sortDir*=-1; else{sortBy=ss; sortDir=(ss==='name')?1:-1;} render();});
  bindRows();
}

function arrow(s){return sortBy===s?`<span class="ar">${sortDir>0?'▲':'▼'}</span>`:'';}

function kitSection(){
  const kit=aggregateKit();
  if(!kit.length) return '';
  const totalKit=kit.reduce((s,c)=>s+c.deuda,0);
  const numFact=kit.reduce((s,c)=>s+c.facturas,0);
  return `<div class="section" style="border-style:dashed">
    <h2>Kit Digital · subvencionado <span style="font-weight:400;color:var(--muted);font-size:12px">(no es deuda real)</span></h2>
    <p class="desc">Facturas financiadas por el programa Kit Digital (Next Generation EU). Se muestran aparte y <b>no</b> cuentan en los KPIs ni en el ranking de deuda. Total subvencionado pendiente: <b>${eur2(totalKit)}</b> · ${numFact} factura(s) · ${kit.length} cliente(s).</p>
    <table>
      <thead><tr><th>Cliente</th><th class="c">Facturas</th><th class="r">Importe subvencionado</th></tr></thead>
      <tbody>${kit.map(c=>`<tr class="trow" data-kk="${c.key}"><td><div class="cname"><span class="dot" style="background:var(--green)"></span>${c.name}</div></td><td class="c">${c.facturas}</td><td class="r amt" style="color:var(--green)">${eur2(c.deuda)}</td></tr>`).join('')}</tbody>
    </table>
  </div>`;
}

function rowsHtml(agg){
  let list=agg.filter(c=>{const f=clients[c.key]||{}; return !q||c.name.toLowerCase().includes(q)||key(f.email||'').includes(q)||(f.tel||'').toLowerCase().includes(q);});
  list=list.map(c=>({...c, prio:(clients[c.key]&&clients[c.key].prio)||0}));
  list.sort((a,b)=>{let av=a[sortBy],bv=b[sortBy]; if(typeof av==='string'){return av.localeCompare(bv)*sortDir;} return ((av||0)-(bv||0))*sortDir;});
  if(!list.length)return `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">Sin resultados para "${q}"</td></tr>`;
  return list.map(c=>{
    const f=clients[c.key]||{}; const hasC=f.tel||f.email; const hasN=f.notas;
    const pr=c.prio||0;
    const prCell=pr?`<span title="${PRIO[pr].label}" style="color:#f6b73c;letter-spacing:1px;font-size:13px">${'★'.repeat(pr)}</span>`:`<span style="color:var(--line);font-size:13px">—</span>`;
    return `<tr class="trow" data-k="${c.key}">
      <td><div class="cname"><span class="dot" style="background:${STCOLOR[c.st]}"></span>${c.name}${hasC?' <span class="ic" title="Contacto">📞</span>':''}${hasN?' <span class="ic" title="Notas">📝</span>':''}</div></td>
      <td class="c">${prCell}</td>
      <td class="c hide-sm"><span class="pill ${c.st}">${STLABEL[c.st]}</span></td>
      <td class="c">${c.facturas}</td>
      <td class="c">${c.maxdias}</td>
      <td class="r amt big">${eur2(c.deuda)}</td>
    </tr>`;
  }).join('');
}
function refreshTable(){const tb=$('#tbody'); if(tb){tb.innerHTML=rowsHtml(aggregate()); bindRows();}}
function bindRows(){$$('.trow').forEach(r=>r.onclick=()=>openClient(r.dataset.k||r.dataset.kk)); $$('.rkrow').forEach(r=>r.onclick=()=>openClient(r.dataset.k));}

function donut(c,total){
  const segs=[['crit',c.crit],['mora',c.mora],['pend',c.pend]].filter(s=>s[1]>0);
  const R=42,C=2*Math.PI*R; let off=0;
  const circles=segs.map(([k,n])=>{const len=n/total*C; const el=`<circle r="${R}" cx="60" cy="60" fill="none" stroke="${STCOLOR[k]}" stroke-width="16" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 60 60)"/>`; off+=len; return el;}).join('');
  const leg=[['crit','Crítico'],['mora','Mora'],['pend','Pendiente']].map(([k,l])=>`<div class="di"><span class="sw" style="background:${STCOLOR[k]}"></span>${l}<span><b>${c[k]}</b></span></div>`).join('');
  return `<div class="donut-wrap"><svg class="donut" width="120" height="120" viewBox="0 0 120 120">${circles}<text x="60" y="58" text-anchor="middle" font-family="Space Grotesk" font-weight="700" font-size="22" fill="#1a2438">${total}</text><text x="60" y="74" text-anchor="middle" font-size="9" fill="#6b7896">clientes</text></svg><div class="dleg">${leg}</div></div>`;
}

function openClient(k){
  const c=aggregate().find(x=>x.key===k) || aggregateKit().find(x=>x.key===k); if(!c)return;
  const f=clients[k]||{};
  const ov=document.createElement('div'); ov.className='ov';
  ov.innerHTML=`<div class="modal">
    <div class="mhead"><button class="close" id="x">×</button><h3>${c.name}</h3><p class="csub">Ficha de cliente · seguimiento de cobro</p></div>
    <div class="mbody">
      <div class="mk3">
        <div class="mk"><div class="v" style="color:var(--red)">${eur2(c.deuda)}</div><div class="l">Deuda pendiente</div></div>
        <div class="mk"><div class="v">${c.facturas}</div><div class="l">Facturas</div></div>
        <div class="mk"><div class="v">${c.maxdias||0} d</div><div class="l">Mora máxima</div></div>
      </div>
      <div class="grid2">
        <div><label>Teléfono</label><input class="fld" id="tel" value="${(f.tel||'').replace(/"/g,'&quot;')}" placeholder="+34 ..."></div>
        <div><label>Email</label><input class="fld" id="email" value="${(f.email||'').replace(/"/g,'&quot;')}" placeholder="contacto@..."></div>
      </div>
      <div style="margin-bottom:14px"><label>Persona de contacto</label><input class="fld" id="contacto" value="${(f.contacto||'').replace(/"/g,'&quot;')}" placeholder="Nombre del responsable"></div>
      <div style="margin-bottom:14px"><label>Prioridad de seguimiento</label><select class="fld" id="prio">${PRIO.map(p=>`<option value="${p.v}" ${(f.prio||0)===p.v?'selected':''}>${p.v?stars(p.v)+'  ':''}${p.label}</option>`).join('')}</select></div>
      <div style="margin-bottom:14px"><label>Notas de seguimiento</label><textarea class="fld" id="notas" placeholder="Llamadas, compromisos de pago, incidencias...">${f.notas||''}</textarea></div>
      <div class="saverow"><span class="saved" id="sv">✓ Ficha guardada</span><button class="btn primary" id="save" style="background:var(--navy);color:#fff">Guardar ficha</button></div>
      <details><summary>Ver ${c.facturas} factura(s) pendiente(s)</summary>
        <table class="ftable"><thead><tr><th>Nº</th><th>Concepto</th><th>Vencimiento</th><th class="c">Días</th><th class="r">Pendiente</th></tr></thead>
        <tbody>${[...c.items].sort((a,b)=>b.pendiente-a.pendiente).map(it=>`<tr><td>${it.num||'-'}</td><td>${(it.desc||'-').slice(0,38)}</td><td>${it.venc||'-'}</td><td class="c">${it.dias}</td><td class="r amt">${eur2(it.pendiente)}</td></tr>`).join('')}</tbody></table>
      </details>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>{ov.remove(); render();};
  $('#x',ov).onclick=close; ov.onclick=e=>{if(e.target===ov)close();};
  $('#save',ov).onclick=async()=>{
    const obj={tel:$('#tel',ov).value.trim(),email:$('#email',ov).value.trim(),contacto:$('#contacto',ov).value.trim(),prio:parseInt($('#prio',ov).value,10)||0,notas:$('#notas',ov).value,name:c.name};
    clients[k]=obj;
    const sv=$('#sv',ov); const btn=$('#save',ov); btn.disabled=true; btn.textContent='Guardando…';
    await saveClient(k,obj);
    btn.disabled=false; btn.textContent='Guardar ficha';
    sv.classList.add('show'); setTimeout(()=>sv.classList.remove('show'),1600);
  };
}

boot();
</script>
</body>
</html>
